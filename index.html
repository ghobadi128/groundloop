<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5b3a29">
<title>GroundLoop — Coffee Grounds Marketplace</title>
<meta name="description" content="GroundLoop connects coffee shops with gardeners and composters to give used coffee grounds a second life.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --brown:#5b3a29; --brown-d:#3f2719; --tan:#c8a27a; --cream:#f7f1e8;
    --green:#2e7d52; --green-l:#e3f1e9; --amber:#d98324; --ink:#241910;
    --muted:#8a7a6c; --line:#e7ddcf; --white:#fff; --danger:#c0392b;
    --shadow:0 6px 24px rgba(60,40,20,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);color:var(--ink);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;
    display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.06)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px;width:100%;padding:13px 14px;
    border:1px solid var(--line);border-radius:12px;background:var(--white);color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--tan)}
  label{font-size:13px;font-weight:600;color:var(--brown);display:block;margin:14px 0 6px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--brown);
    color:#fff;padding:14px 18px;border-radius:14px;font-weight:700;font-size:15px;width:100%;transition:transform .05s,opacity .2s}
  .btn:active{transform:scale(.98)}
  .btn.green{background:var(--green)} .btn.amber{background:var(--amber)}
  .btn.ghost{background:transparent;color:var(--brown);border:1.5px solid var(--tan)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:11px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;
    font-size:12px;font-weight:700;background:var(--green-l);color:var(--green)}
  .chip.amber{background:#fbedd9;color:var(--amber)} .chip.grey{background:#eee5d8;color:var(--muted)}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .muted{color:var(--muted)} h1,h2,h3{margin:0 0 4px}
  .pad{padding:18px} .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .grow{flex:1} .center{text-align:center} .hidden{display:none!important}
  .topbar{position:sticky;top:0;z-index:30;background:var(--brown);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
  .topbar .logo{font-weight:800;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  .topbar .icon-btn{color:#fff;font-size:20px;position:relative;padding:4px}
  .badge{position:absolute;top:-2px;right:-4px;background:var(--amber);color:#fff;font-size:10px;font-weight:800;
    border-radius:999px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .modeflag{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:999px;margin-left:6px;font-weight:700;vertical-align:middle}
  .trial-banner{background:var(--amber);color:#fff;font-size:13px;font-weight:600;padding:8px 18px;text-align:center}
  .trial-banner.expired{background:var(--danger)}
  .content{flex:1;overflow-y:auto;padding-bottom:78px}
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;
    border-top:1px solid var(--line);display:flex;z-index:30;padding:7px 0 calc(7px + env(safe-area-inset-bottom))}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10.5px;font-weight:600;padding:5px 0}
  .nav button .ic{font-size:21px} .nav button.active{color:var(--brown)}
  .listing{display:flex;gap:12px;align-items:flex-start}
  .thumb{width:64px;height:64px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--green-l)}
  .meta{font-size:12.5px;color:var(--muted)} .qty{font-weight:800;color:var(--brown)}
  .seg{display:flex;background:#efe6d8;border-radius:14px;padding:4px;margin:0 0 14px}
  .seg button{flex:1;padding:9px;border-radius:11px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg button.active{background:#fff;color:var(--brown);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .catbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none} .catbar::-webkit-scrollbar{display:none}
  .catbar button{white-space:nowrap;padding:8px 13px;border-radius:999px;font-size:13px;font-weight:700;background:#fff;border:1px solid var(--line);color:var(--muted)}
  .catbar button.active{background:var(--brown);color:#fff;border-color:var(--brown)}
  #map{height:330px;border-radius:18px;overflow:hidden;border:1px solid var(--line)}
  .leaflet-popup-content{margin:10px 12px;font-size:13px}
  .overlay{position:fixed;inset:0;background:rgba(30,18,10,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--cream);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:8px 18px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:up .25s ease}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grab{width:42px;height:5px;background:#d8cbb9;border-radius:999px;margin:6px auto 12px}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}
  .stat .n{font-size:24px;font-weight:800;color:var(--green)} .stat .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;z-index:80;font-weight:600;box-shadow:var(--shadow);max-width:90%;text-align:center}
  .review{border-top:1px solid var(--line);padding:10px 0;font-size:13.5px} .stars{color:var(--amber);letter-spacing:1px}
  .msg{max-width:78%;padding:10px 13px;border-radius:16px;margin-bottom:8px;font-size:14px;line-height:1.35}
  .msg.them{background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.me{background:var(--brown);color:#fff;margin-left:auto;border-bottom-right-radius:5px}
  .notif{display:flex;gap:11px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line)}
  .dot{width:9px;height:9px;border-radius:999px;background:var(--amber);margin-top:6px;flex-shrink:0}
  .price-card{border:2px solid var(--line);border-radius:18px;padding:18px;margin-bottom:12px;background:#fff}
  .price-card.feat{border-color:var(--green);position:relative}
  .price-card .amt{font-size:30px;font-weight:800;color:var(--brown)}
  .feat-list{list-style:none;padding:0;margin:12px 0 0;font-size:14px}
  .feat-list li{padding:5px 0 5px 26px;position:relative}
  .feat-list li:before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:800}
  .hero{background:linear-gradient(155deg,var(--brown),var(--brown-d));color:#fff;padding:44px 24px 36px;text-align:center}
  .hero .big{font-size:30px;font-weight:800;line-height:1.15;margin:14px 0 8px}
  .hero .sub{opacity:.9;font-size:15px;margin-bottom:24px}
  .rolebtn{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:15px;text-align:left;width:100%;margin-bottom:10px;display:flex;gap:13px;align-items:center}
  .rolebtn .e{font-size:26px} .rolebtn.sel{border-color:var(--brown);background:#fff6ec}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px} a{color:var(--green)}
  /* How it works roadmap */
  .hiw{padding:30px 20px;background:var(--cream)}
  .hiw h2{text-align:center;font-size:22px;margin-bottom:4px}
  .hiw .lead{text-align:center;color:var(--muted);font-size:14px;margin-bottom:18px}
  .lane-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
  .lane-tabs button{padding:8px 16px;border-radius:999px;font-weight:700;font-size:13px;border:1.5px solid var(--tan);background:#fff;color:var(--brown)}
  .lane-tabs button.active{background:var(--brown);color:#fff;border-color:var(--brown)}
  .road{position:relative;padding-left:42px}
  .road:before{content:"";position:absolute;left:17px;top:8px;bottom:8px;width:3px;background:linear-gradient(var(--tan),var(--green));border-radius:9px}
  .step{position:relative;margin-bottom:16px}
  .step .num{position:absolute;left:-42px;top:0;width:34px;height:34px;border-radius:50%;background:var(--brown);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:var(--shadow)}
  .step .box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow)}
  .step .box b{display:block;font-size:15px}
  .step .box .d{font-size:13px;color:var(--muted);margin-top:2px}
  .step .ico{font-size:18px;margin-right:6px}
  .fab{position:fixed;bottom:90px;right:calc(50% - 240px + 18px);background:var(--amber);color:#fff;width:56px;height:56px;border-radius:18px;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:25}
  @media(max-width:520px){.fab{right:18px}}
  .deliv-opt{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;width:100%;text-align:left}
  .deliv-opt .e{font-size:26px}
</style>
</head>
<body>
<div id="app"><div id="screen"><div class="pad center" style="padding-top:80px"><div style="font-size:46px">☕🔁</div><p class="muted">Loading GroundLoop…</p></div></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
/* ============================================================
   GroundLoop — production-ready single-file marketplace
   MODE = 'live'  when Supabase keys present (shared cloud DB)
   MODE = 'demo'  otherwise (data in browser localStorage)
============================================================ */
const CFG = window.GROUNDLOOP_CONFIG || {};
const $  = (s,el=document)=>el.querySelector(s);
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const screen = ()=>$('#screen');
const DAY = 86400000;
const fmtDate = (ts)=>new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
const genId = (p)=> (window.crypto&&crypto.randomUUID)?crypto.randomUUID():(p+Date.now()+Math.random().toString(16).slice(2));

let sb=null, MODE='demo';
if(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase){
  sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  MODE='live';
}

const CATS = [
  {id:'grounds',  name:'Coffee Grounds', emoji:'☕'},
  {id:'grain',    name:'Brewery Grain',  emoji:'🌾'},
  {id:'woodchip', name:'Wood Chips',     emoji:'🪵'},
  {id:'cardboard',name:'Cardboard',      emoji:'📦'},
  {id:'mulch',    name:'Mulch',          emoji:'🍂'},
  {id:'compost',  name:'Compost',        emoji:'🍃'},
];
const catOf = id => CATS.find(c=>c.id===id)||CATS[0];

/* ---------------- in-memory cache (UI reads from here) ---------------- */
let state = {
  session:null, users:[], listings:[], reservations:[],
  threads:{}, notifications:[], nextId:100,
};
function user(id){ return state.users.find(u=>u.id===id); }
function me(){ return state.session ? user(state.session) : null; }

/* ============================================================
   DATA LAYER  (demo = localStorage,  live = Supabase)
============================================================ */
const LS_KEY='groundloop_v2';
function lsSave(){ if(MODE==='demo') localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function seedDemo(){
  const now=Date.now();
  state={
    session:null,
    users:[
      {id:'u_shop1',role:'shop',name:'Rwanda Roasters',bizName:'Rwanda Roasters',email:'shop@demo.com',pass:'demo',lat:40.7308,lng:-73.9973,joined:now-40*DAY,rating:4.8,reviews:[]},
      {id:'u_shop2',role:'shop',name:'Brooklyn Bean Co',bizName:'Brooklyn Bean Co',email:'shop2@demo.com',pass:'demo',lat:40.7128,lng:-74.0060,joined:now-25*DAY,rating:4.6,reviews:[]},
      {id:'u_col1',role:'collector',name:'Maya Greene',email:'collector@demo.com',pass:'demo',joined:now-2*DAY,trialStart:now-2*DAY,plan:'trial',rating:5,reviews:[]},
      {id:'u_drv1',role:'driver',name:'Sam Rivera',email:'driver@demo.com',pass:'demo',joined:now-10*DAY,rating:4.9,reviews:[]},
      {id:'u_admin',role:'admin',name:'Admin',email:'admin@demo.com',pass:'demo',joined:now-90*DAY,reviews:[]},
    ],
    listings:[
      {id:'l1',shopId:'u_shop1',cat:'grounds',title:'Fresh espresso grounds',qty:18,unit:'lbs',window:'Today 2–6pm',lat:40.7308,lng:-73.9973,note:'Bagged & ready. BYO container welcome.',created:now-3*3600e3,status:'open'},
      {id:'l2',shopId:'u_shop2',cat:'grounds',title:'Drip + espresso mix',qty:32,unit:'lbs',window:'Tomorrow 9am–12pm',lat:40.7128,lng:-74.0060,note:'Large batch from weekend rush.',created:now-6*3600e3,status:'open'},
      {id:'l3',shopId:'u_shop1',cat:'cardboard',title:'Flattened coffee boxes',qty:25,unit:'lbs',window:'Today 4–7pm',lat:40.7320,lng:-73.9950,note:'Clean, dry, great for sheet mulching.',created:now-1*3600e3,status:'open'},
      {id:'l4',shopId:'u_shop2',cat:'grain',title:'Spent brewery grain (partner)',qty:60,unit:'lbs',window:'Fri 10am–2pm',lat:40.7100,lng:-74.0080,note:'From neighboring brewery.',created:now-12*3600e3,status:'open'},
    ],
    reservations:[{id:'r1',listingId:'l2',userId:'u_col1',mode:'pickup',status:'completed',lbs:32,created:now-5*DAY,completed:now-5*DAY}],
    threads:{},
    notifications:[
      {id:'n1',userId:'u_col1',text:'New listing nearby: Flattened coffee boxes (25 lbs)',ts:now-1*3600e3,read:false},
      {id:'n2',userId:'u_col1',text:'Your pickup at Brooklyn Bean Co was completed. 32 lbs diverted! 🌱',ts:now-5*DAY,read:true},
    ],
    nextId:100,
  };
  lsSave();
}

/* ---- mappers between DB rows (snake) and app objects (camel) ---- */
const mapProfile = r=>({id:r.id,role:r.role,name:r.name,bizName:r.biz_name,email:r.email,lat:r.lat,lng:r.lng,
  plan:r.plan,planType:r.plan_type,trialStart:r.trial_start?+new Date(r.trial_start):Date.now(),
  joined:r.created_at?+new Date(r.created_at):Date.now(),rating:r.rating||0,reviews:[]});
const mapListing = r=>({id:r.id,shopId:r.shop_id,cat:r.cat,title:r.title,qty:Number(r.qty),unit:r.unit,
  window:r.pickup_window,note:r.note,lat:r.lat,lng:r.lng,status:r.status,created:+new Date(r.created_at)});
const mapResv = r=>({id:r.id,listingId:r.listing_id,userId:r.user_id,mode:r.mode,status:r.status,lbs:Number(r.lbs),
  driverId:r.driver_id,created:+new Date(r.created_at),completed:r.completed_at?+new Date(r.completed_at):null});

async function hydrateLive(){
  const [{data:profs},{data:lists},{data:resv},{data:msgs},{data:notes},{data:revs}] = await Promise.all([
    sb.from('profiles').select('*'),
    sb.from('listings').select('*').order('created_at',{ascending:false}),
    sb.from('reservations').select('*'),
    sb.from('messages').select('*').order('created_at'),
    sb.from('notifications').select('*').order('created_at',{ascending:false}),
    sb.from('reviews').select('*').order('created_at',{ascending:false}),
  ]);
  state.users = (profs||[]).map(mapProfile);
  (revs||[]).forEach(rv=>{ const s=user(rv.shop_id); if(s) s.reviews.push({stars:rv.stars,text:rv.body,by:rv.by_name,ts:+new Date(rv.created_at)}); });
  state.listings = (lists||[]).map(mapListing);
  state.reservations = (resv||[]).map(mapResv);
  state.threads={}; (msgs||[]).forEach(m=>{ (state.threads[m.thread_key]=state.threads[m.thread_key]||[]).push({from:m.from_id,text:m.body,ts:+new Date(m.created_at)}); });
  state.notifications = (notes||[]).map(n=>({id:n.id,userId:n.user_id,text:n.body,ts:+new Date(n.created_at),read:n.read}));
}

/* ---- write helpers (used by UI) ---- */
async function upsertProfile(u){
  if(MODE==='demo'){ lsSave(); return; }
  await sb.from('profiles').upsert({id:u.id,role:u.role,name:u.name,biz_name:u.bizName||null,email:u.email,
    lat:u.lat,lng:u.lng,plan:u.plan||'trial',plan_type:u.planType||null,
    trial_start:new Date(u.trialStart||Date.now()).toISOString(),rating:u.rating||0});
}
async function addListingDB(l){
  if(MODE==='demo'){ lsSave(); return; }
  await sb.from('listings').insert({id:l.id,shop_id:l.shopId,cat:l.cat,title:l.title,qty:l.qty,unit:l.unit,
    pickup_window:l.window,note:l.note,lat:l.lat,lng:l.lng,status:l.status});
}
async function updateListingDB(l){ if(MODE==='demo'){lsSave();return;} await sb.from('listings').update({status:l.status,qty:l.qty}).eq('id',l.id); }
async function addResvDB(r){
  if(MODE==='demo'){ lsSave(); return; }
  await sb.from('reservations').insert({id:r.id,listing_id:r.listingId,user_id:r.userId,mode:r.mode,status:r.status,lbs:r.lbs,driver_id:r.driverId||null});
}
async function updateResvDB(r){ if(MODE==='demo'){lsSave();return;} await sb.from('reservations').update({status:r.status,driver_id:r.driverId||null,completed_at:r.completed?new Date(r.completed).toISOString():null}).eq('id',r.id); }
async function addNotifDB(n){ if(MODE==='demo'){lsSave();return;} await sb.from('notifications').insert({id:n.id,user_id:n.userId,body:n.text,read:!!n.read}); }
async function markNotifsRead(ids){ if(MODE==='demo'){lsSave();return;} if(ids.length) await sb.from('notifications').update({read:true}).in('id',ids); }
async function addMsgDB(k,m){ if(MODE==='demo'){lsSave();return;} await sb.from('messages').insert({thread_key:k,from_id:m.from,body:m.text}); }
async function addReviewDB(shopId,rv){ if(MODE==='demo'){lsSave();return;} await sb.from('reviews').insert({shop_id:shopId,by_name:rv.by,stars:rv.stars,body:rv.text}); }

/* ---- realtime: keep listings/notifications live ---- */
function startRealtime(){
  if(MODE!=='live') return;
  sb.channel('gl-listings').on('postgres_changes',{event:'*',schema:'public',table:'listings'},async ()=>{
    const {data}=await sb.from('listings').select('*').order('created_at',{ascending:false});
    state.listings=(data||[]).map(mapListing); if(route.tab==='browse'||route.tab==='mine') render();
  }).subscribe();
  sb.channel('gl-notes').on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications'},(p)=>{
    const n=p.new; if(me()&&n.user_id===me().id){ state.notifications.unshift({id:n.id,userId:n.user_id,text:n.body,ts:Date.now(),read:false}); toast('🔔 '+n.body); render(); }
  }).subscribe();
}

/* ============================================================
   GEOLOCATION / NEAR ME
============================================================ */
let myLoc=null;
function distMi(a,b){
  if(!a||!b||a.lat==null||b.lat==null) return null;
  const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,
    la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(h));
}
function locate(cb){
  if(!navigator.geolocation){ cb&&cb(null); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ myLoc={lat:p.coords.latitude,lng:p.coords.longitude}; cb&&cb(myLoc); },
    ()=>{ cb&&cb(null); },{enableHighAccuracy:true,timeout:8000,maximumAge:60000});
}

/* ---------------- toast ---------------- */
let toastT;
function toast(msg){ clearTimeout(toastT); let t=$('#toast'); if(t)t.remove();
  t=el(`<div id="toast" class="toast">${msg}</div>`); document.body.appendChild(t); toastT=setTimeout(()=>t.remove(),2800); }

/* ---------------- router ---------------- */
let route={tab:'browse'};
function go(tab){ route.tab=tab; render(); }

/* ============================================================
   BOOT
============================================================ */
async function boot(){
  // handle Stripe return (?paid=monthly|annual)
  const params=new URLSearchParams(location.search);
  const paid=params.get('paid');
  if(MODE==='live'){
    const {data:{session}}=await sb.auth.getSession();
    if(session){ await hydrateLive(); state.session=session.user.id;
      if(!user(state.session)) state.session=null; }
    startRealtime();
  } else {
    const saved=localStorage.getItem(LS_KEY);
    if(saved){ try{state=JSON.parse(saved);}catch(e){seedDemo();} } else seedDemo();
  }
  if(paid && me() && me().role==='collector'){

const TRIAL_DAYS=30;
function trialDaysLeft(u){ if(!u||u.role!=='collector') return null;
  if(u.plan==='active') return 'subscribed';
  const used=(Date.now()-(u.trialStart||u.joined))/DAY; return Math.max(0,Math.ceil(TRIAL_DAYS-used)); }
function collectorLocked(u){ if(!u||u.role!=='collector') return false; if(u.plan==='active') return false; return trialDaysLeft(u)<=0; }

  if(myLoc) L.circleMarker([myLoc.lat,myLoc.lng],{radius:8,color:'#1565c0',fillColor:'#42a5f5',fillOpacity:1,weight:3}).addTo(mapObj).bindPopup('You are here');

  mine.forEach(r=>{ const l=state.listings.find(x=>x.id===r.listingId)||{}; const s=user(l.shopId); const cat=catOf(l.cat);
    const sc=r.status==='completed'?'<span class="chip">✓ Completed</span>':r.status==='requested'?'<span class="chip amber">🚐 Delivery requested</span>':r.status==='enroute'?'<span class="chip amber">🚐 Driver en route</span>':'<span class="chip amber">Reserved · pickup</span>';
    const card=el(`<div class="card"><div class="listing"><div class="thumb">${cat.emoji||'☕'}</div><div class="grow">
      <div class="between"><b>${l.title||'Listing'}</b><span class="qty">${r.lbs} lbs</span></div>
      <div class="meta">${s?s.bizName||s.name:''} · ${l.window||''}</div><div style="margin-top:8px">${sc}</div></div></div>
      <div class="row" style="margin-top:12px;gap:8px" id="acts"></div></div>`);
    const acts=$('#acts',card);
    if(r.status!=='completed'){
      const done=el('<button class="btn green sm">Mark collected</button>');
      done.onclick=async()=>{ r.status='completed'; r.completed=Date.now();
        const n={id:genId('n_'),userId:l.shopId,text:`${u.name} collected "${l.title}". ${r.lbs} lbs diverted! 🌱`,ts:Date.now(),read:false};
        state.notifications.push(n); await updateResvDB(r); await addNotifDB(n); toast(`Nice! ${r.lbs} lbs diverted 🌱`); render(); };
      const rev=el('<button class="btn ghost sm">Review shop</button>'); rev.onclick=()=>openReview(l.shopId,r); acts.append(done,rev);
    } else { const rev=el('<button class="btn ghost sm">Review shop</button>'); rev.onclick=()=>openReview(l.shopId,r); acts.append(rev); }
    wrap.appendChild(card); });
}
function openReview(shopId,r){
  let stars=5;
  const ov=sheet(`<h2>Rate your pickup</h2><p class="muted">${(user(shopId)||{}).bizName||(user(shopId)||{}).name||''}</p>
    <div id="stars" style="font-size:36px;text-align:center;color:var(--amber);margin:10px 0;letter-spacing:6px"></div>
    <textarea id="rtext" rows="3" placeholder="How was it?"></textarea><button class="btn green" id="sub" style="margin-top:14px">Submit review</button>`);
  const draw=()=>$('#stars',ov).innerHTML=[1,2,3,4,5].map(i=>`<span data-i="${i}" style="cursor:pointer">${i<=stars?'★':'☆'}</span>`).join('');
  draw(); $('#stars',ov).onclick=(e)=>{ if(e.target.dataset.i){stars=+e.target.dataset.i;draw();} };
  $('#sub',ov).onclick=async()=>{ const s=user(shopId); if(!s)return; s.reviews=s.reviews||[];
    const rv={stars,text:$('#rtext',ov).value||'(no comment)',by:me().name,ts:Date.now()}; s.reviews.unshift(rv);
    s.rating=Math.round(s.reviews.reduce((a,b)=>a+b.stars,0)/s.reviews.length*10)/10;
    await addReviewDB(shopId,rv); await upsertProfile(s); ov.remove(); toast('Thanks for the review! ⭐'); };
}

/* ============================================================
   SHOP LISTINGS + POST
============================================================ */

  c.innerHTML='<div class="pad"><div class="between"><h1>Your listings</h1></div><div id="ll"></div></div>'; const ll=$('#ll',c);
  const add=el('<button class="btn green" style="margin:6px 0 16px">＋ Post available material</button>'); add.onclick=openPostListing; ll.appendChild(add);
  if(!mine.length) ll.appendChild(el('<div class="empty">No listings yet. Post surplus grounds to reach collectors nearby.</div>'));
  mine.forEach(l=>{ const cat=catOf(l.cat); const res=state.reservations.filter(r=>r.listingId===l.id);
    const card=el(`<div class="card listing"><div class="thumb">${cat.emoji}</div><div class="grow">
      <div class="between"><b>${l.title}</b><span class="qty">${l.qty} ${l.unit}</span></div><div class="meta">🕒 ${l.window}</div>

}
function openPostListing(){
  const u=me();
  const ov=sheet(`<h2>Post material</h2>
    <label>Category</label><select id="cat">${CATS.map(x=>`<option value="${x.id}">${x.emoji} ${x.name}</option>`).join('')}</select>
    <label>Title</label><input id="title" placeholder="e.g. Fresh espresso grounds">
    <div class="row"><div class="grow"><label>Quantity</label><input id="qty" type="number" value="10"></div>

    <label>Pickup window</label><input id="win" placeholder="e.g. Today 2–6pm">
    <label>Notes (optional)</label><textarea id="note" rows="2" placeholder="Containers, access, etc."></textarea>
    <button class="btn green" id="post" style="margin-top:16px">Publish listing</button>`);
  $('#post',ov).onclick=async()=>{

    if(!title||!qty||!win){ toast('Add title, quantity & window'); return; }

    ov.remove(); toast('Listing published 📣 Collectors notified'); render();
  };
}

/* ============================================================
   IMPACT / SUSTAINABILITY
============================================================ */
function viewImpact(c){
  const u=me(); const completed=state.reservations.filter(r=>r.status==='completed');
  let scope=completed;
  if(u.role==='shop'){ const myL=state.listings.filter(l=>l.shopId===u.id).map(l=>l.id); scope=completed.filter(r=>myL.includes(r.listingId)); }
  const lbs=scope.reduce((a,r)=>a+(r.lbs||0),0), co2=Math.round(lbs*0.34), trees=Math.max(1,Math.round(co2/21));
  c.innerHTML=`<div class="pad"><h1>${u.role==='shop'?'Your sustainability impact':'Community impact'}</h1>
    <p class="muted">${u.role==='shop'?'Material diverted via your listings.':'Across all GroundLoop members.'}</p>
    <div class="row" style="margin:14px 0;gap:10px"><div class="stat"><div class="n">${lbs}</div><div class="l">lbs diverted</div></div>
      <div class="stat"><div class="n">${co2}</div><div class="l">kg CO₂e avoided</div></div><div class="stat"><div class="n">${trees}</div><div class="l">tree-yrs equiv.</div></div></div>
    <div class="card"><b>Completion rate</b><div class="meta">Pickups: ${completed.filter(r=>r.mode==='pickup').length} · Deliveries: ${completed.filter(r=>r.mode==='delivery').length}</div>
      <div style="height:12px;background:#eee5d8;border-radius:99px;margin-top:10px;overflow:hidden"><div style="height:100%;width:${state.reservations.length?Math.round(completed.length/state.reservations.length*100):0}%;background:var(--green)"></div></div>
      <div class="meta" style="margin-top:6px">${state.reservations.length?Math.round(completed.length/state.reservations.length*100):0}% of reservations fulfilled</div></div>
    <div class="card"><b>By category</b><div id="bycat" style="margin-top:8px"></div></div>
    ${u.role==='shop'?'<button class="btn ghost" id="report">⬇ Download sustainability report</button>':''}</div>`;
  const bc=$('#bycat',c);
  CATS.forEach(cat=>{ const ids=state.listings.filter(l=>l.cat===cat.id).map(l=>l.id);
    const sum=scope.filter(r=>ids.includes(r.listingId)).reduce((a,r)=>a+r.lbs,0);
    if(sum>0) bc.appendChild(el(`<div class="between" style="padding:5px 0"><span>${cat.emoji} ${cat.name}</span><b>${sum} lbs</b></div>`)); });
  if(!bc.children.length) bc.innerHTML='<div class="meta">No completed pickups yet.</div>';
  if($('#report',c)) $('#report',c).onclick=()=>downloadReport(u,lbs,co2,scope);
}
function downloadReport(u,lbs,co2,scope){
  const lines=['GroundLoop Sustainability Report','Business: '+(u.bizName||u.name),'Generated: '+new Date().toLocaleString(),
    '----------------------------------------','Total material diverted: '+lbs+' lbs','Estimated CO2e avoided: '+co2+' kg','Completed handoffs: '+scope.length,'','Detail:',
    ...scope.map(r=>{const l=state.listings.find(x=>x.id===r.listingId)||{};return ` - ${fmtDate(r.completed||r.created)} · ${l.title||'item'} · ${r.lbs} lbs · ${r.mode}`;}),'','Generated by GroundLoop.'].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([lines],{type:'text/plain'})); a.download='groundloop-sustainability-report.txt'; a.click(); toast('Report downloaded 📄');
}

/* ============================================================
   DELIVERY PARTNER JOBS
============================================================ */
function viewJobs(c){
  const u=me();
  const open=state.reservations.filter(r=>r.mode==='delivery'&&(r.status==='requested'||(r.status==='enroute'&&r.driverId===u.id)));
  const D=CFG.DELIVERY||{};
  c.innerHTML=`<div class="pad"><h1>Delivery jobs</h1><p class="muted">Accept requests & deliver material to collectors.</p>
    <div class="card" style="background:#fff6ec"><b>Want more delivery work?</b><div class="meta" style="margin:6px 0 10px">Sign up with partner networks to earn on your schedule.</div>
      <div class="row" style="gap:8px"><button class="btn ghost sm" id="uberD">Drive with Uber</button><button class="btn ghost sm" id="ddD">Dash with DoorDash</button></div></div>
    <div id="j"></div></div>`;
  $('#uberD',c).onclick=()=>window.open(D.uberDriverSignup||'https://www.uber.com/signup/drive/','_blank');
  $('#ddD',c).onclick=()=>window.open(D.doordashDasherSignup||'https://dasher.doordash.com/','_blank');
  const j=$('#j',c);
  if(!open.length){ j.appendChild(el('<div class="empty">No delivery requests right now. Check back soon.</div>')); return; }
  open.forEach(r=>{ const l=state.listings.find(x=>x.id===r.listingId)||{}; const s=user(l.shopId); const col=user(r.userId);
    const card=el(`<div class="card"><div class="between"><b>${l.title}</b><span class="qty">${r.lbs} lbs</span></div>
      <div class="meta">From: ${s?s.bizName||s.name:''}</div><div class="meta">To: ${col?col.name:''}</div><div class="meta">🕒 ${l.window||''}</div>
      <div class="row" style="margin-top:10px" id="a"></div></div>`); const a=$('#a',card);
    if(r.status==='requested'){ const b=el('<button class="btn green sm">Accept job</button>');
      b.onclick=async()=>{ r.status='enroute'; r.driverId=u.id; const n={id:genId('n_'),userId:r.userId,text:`🚐 ${u.name} is delivering your ${l.title}`,ts:Date.now(),read:false}; state.notifications.push(n); await updateResvDB(r); await addNotifDB(n); toast('Job accepted 🚐'); render(); }; a.appendChild(b);
    } else { const b=el('<button class="btn green sm">Mark delivered</button>');
      b.onclick=async()=>{ r.status='completed'; r.completed=Date.now(); const n={id:genId('n_'),userId:r.userId,text:`✓ Your ${l.title} was delivered. ${r.lbs} lbs diverted! 🌱`,ts:Date.now(),read:false}; state.notifications.push(n); await updateResvDB(r); await addNotifDB(n); toast('Delivered ✓'); render(); }; a.appendChild(b); }
    j.appendChild(card); });
}

/* ============================================================
   ALERTS / NOTIFICATIONS
============================================================ */
function viewAlerts(c){ renderNotifList(c,false); }
function openNotifications(){ const ov=sheet('<h2>Notifications</h2><div id="nl"></div>'); renderNotifList($('#nl',ov),true); }
async function renderNotifList(container,inSheet){
  const u=me(); const mine=state.notifications.filter(n=>n.userId===u.id).sort((a,b)=>b.ts-a.ts);
  const wrap=inSheet?container:(()=>{container.innerHTML='<div class="pad"><h1>Alerts</h1><div id="nl"></div></div>';return $('#nl',container);})();
  if(!mine.length) wrap.innerHTML='<div class="empty">No notifications yet.</div>';
  else mine.forEach(n=>wrap.appendChild(el(`<div class="notif">${n.read?'<div style="width:9px"></div>':'<div class="dot"></div>'}<div><div>${n.text}</div><div class="meta">${fmtDate(n.ts)} · ${new Date(n.ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</div></div></div>`)));
  const unreadIds=mine.filter(n=>!n.read).map(n=>n.id); mine.forEach(n=>n.read=true);
  await markNotifsRead(unreadIds);
  const bell=$('#bell'); if(bell) bell.innerHTML='🔔';
}

/* ============================================================
   MESSAGING
============================================================ */
function threadKey(a,b){ return [a,b].sort().join('|'); }
function viewInbox(c){
  const u=me(); const keys=Object.keys(state.threads).filter(k=>k.split('|').includes(u.id));
  c.innerHTML='<div class="pad"><h1>Inbox</h1><div id="tl"></div></div>'; const tl=$('#tl',c);
  if(!keys.length){ tl.appendChild(el('<div class="empty">No messages yet. Message a shop from a listing to coordinate pickup.</div>')); return; }
  keys.forEach(k=>{ const other=k.split('|').find(x=>x!==u.id); const o=user(other); const msgs=state.threads[k]; const last=msgs[msgs.length-1];
    const card=el(`<div class="card"><div class="between"><b>${o?(o.bizName||o.name):'User'}</b><span class="meta">${fmtDate(last.ts)}</span></div><div class="meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${last.text}</div></div>`);
    card.onclick=()=>openThread(other); tl.appendChild(card); });
}
function openThread(otherId){
  const u=me(); const o=user(otherId); const k=threadKey(u.id,otherId); state.threads[k]=state.threads[k]||[];
  const ov=sheet(`<h2>${o?(o.bizName||o.name):'Chat'}</h2><div id="msgs" style="margin:14px 0;max-height:50vh;overflow-y:auto"></div>
    <div class="row"><input id="mi" placeholder="Type a message…" class="grow"><button class="btn sm" id="send">Send</button></div>`);
  const draw=()=>{ const box=$('#msgs',ov); box.innerHTML=''; if(!state.threads[k].length) box.innerHTML='<div class="meta center">Say hello 👋</div>';
    state.threads[k].forEach(m=>box.appendChild(el(`<div class="msg ${m.from===u.id?'me':'them'}">${m.text}</div>`))); box.scrollTop=box.scrollHeight; };
  draw();
  const send=async()=>{ const v=$('#mi',ov).value.trim(); if(!v) return; const m={from:u.id,text:v,ts:Date.now()};
    state.threads[k].push(m); $('#mi',ov).value=''; draw(); await addMsgDB(k,m);
    if(MODE==='demo' && o && o.role==='shop'){ setTimeout(()=>{ state.threads[k].push({from:o.id,text:'Thanks! Grounds are bagged by the side door — see you in the window 👍',ts:Date.now()}); lsSave(); draw(); },900); } };
  $('#send',ov).onclick=send; $('#mi',ov).addEventListener('keydown',e=>{if(e.key==='Enter')send();});
}

      <button class="btn green" id="buyM" style="margin-top:14px">${u.plan==='active'?'Current plan':'Start — $6/mo'}</button></div>

      <button class="btn ghost" id="buyA" style="margin-top:14px">Choose annual</button></div>

    ${u.plan==='active'?'<button class="btn ghost" id="cancel" style="margin-top:8px">Cancel subscription</button>':''}`);
  const buy=(plan)=>{ const link=plan==='annual'?CFG.STRIPE_ANNUAL_LINK:CFG.STRIPE_MONTHLY_LINK;
    if(link){ const url=new URL(link); url.searchParams.set('client_reference_id',u.id);
      url.searchParams.set('prefilled_email',u.email||''); ov.remove(); location.href=url.toString(); }

    <div class="row"><div class="grow"><label>Expiry</label><input id="exp" value="12/28"></div><div style="width:120px"><label>CVC</label><input id="cvc" value="123"></div></div>

   ADMIN

/* ============================================================
   PROFILE
============================================================ */
function viewProfile(c){
  const u=me(); const left=trialDaysLeft(u); let planRow='';
  if(u.role==='collector'){
    planRow=u.plan==='active'
      ? `<div class="card"><div class="between"><div><b>GroundLoop Plus</b><div class="meta">${u.planType==='annual'?'Annual':'Monthly'} · active</div></div><span class="chip">Subscribed</span></div><button class="btn ghost sm" id="manage" style="margin-top:10px">Manage plan</button></div>`
      : `<div class="card" style="background:#fff6ec"><div class="between"><div><b>Free trial</b><div class="meta">${left>0?left+' days remaining':'Ended'}</div></div><span class="chip amber">${left>0?'Trial':'Expired'}</span></div><button class="btn amber sm" id="manage" style="margin-top:10px">Subscribe</button></div>`;
  }
  c.innerHTML=`<div class="pad"><div class="center" style="margin:6px 0 18px">
      <div class="thumb" style="width:80px;height:80px;margin:0 auto;font-size:38px;border-radius:50%">${u.role==='shop'?'🏪':u.role==='driver'?'🚐':u.role==='admin'?'🛠️':'🌱'}</div>
      <h2 style="margin-top:10px">${u.bizName||u.name}</h2><div class="muted">${u.email} · ${u.role}</div>${u.rating?`<div class="stars" style="margin-top:4px">⭐ ${u.rating}</div>`:''}</div>
    ${planRow}
    <div class="card"><b>Account</b>
      <div class="between" style="padding:8px 0;border-top:1px solid var(--line);margin-top:8px"><span>Member since</span><span class="meta">${fmtDate(u.joined)}</span></div>
      <div class="between" style="padding:8px 0;border-top:1px solid var(--line)"><span>Mode</span><span class="meta">${MODE==='live'?'Live (cloud)':'Demo (local)'}</span></div></div>
    ${MODE==='demo'?'<button class="btn ghost" id="reset" style="margin-bottom:10px">↺ Reset demo data</button>':''}
    <button class="btn" id="logout" style="background:var(--danger)">Log out</button></div>`;
  if($('#manage',c)) $('#manage',c).onclick=openPaywall;
  $('#logout',c).onclick=async()=>{ if(MODE==='live') await sb.auth.signOut(); state.session=null; lsSave(); render(); };
  if($('#reset',c)) $('#reset',c).onclick=()=>{ if(confirm('Reset all demo data?')){ localStorage.removeItem(LS_KEY); seedDemo(); toast('Demo data reset'); render(); } };
}

boot();
